start_mowing_zones:
  name: Start mowing zones
  description: >
    Start mowing specific zones by their numeric IDs. Zone IDs are visible in the
    mower entity's state attributes (zones list) after a map update.
  target:
    entity:
      integration: dreame_mower
      domain: lawn_mower
  fields:
    zone_ids:
      name: Zone IDs
      description: List of zone IDs to mow (e.g. [1, 2]).
      required: true
      example: "[1, 2]"
      selector:
        object:
